<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>댓글 수정하기</title>
    <style>
        /* 깔끔하게 에브리타임 스타일로 맞춘 임시 디자인 */
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; display: flex; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { font-size: 16px; margin-bottom: 15px; color: #333; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; resize: none; box-sizing: border-box; font-size: 13px; }
        .btn-group { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
        button, a { padding: 8px 14px; border-radius: 5px; font-size: 12px; text-decoration: none; cursor: pointer; border: none; }
        .submit-btn { background: #FE332E; color: white; }
        .cancel-btn { background: #eee; color: #666; }
    </style>
</head>
<body>
    <div class="box">
        <h2>✏️ 댓글 수정하기</h2>
        <form method="POST">
            {% csrf_token %}
            <textarea name="content" required>{{ comment.content }}</textarea>
            <div class="btn-group">
                <a href="{% url 'posts:detail' comment.post.id %}" class="cancel-btn">취소</a>
                <button type="submit" class="submit-btn">수정 완료</button>
            </div>
        </form>
    </div>
</body>
</html>
