{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 완료</title>
    <link rel="stylesheet" href="{% static 'css/signup_complete.css' %}">
</head>
<body>
    <div class="complete-container">
        <div class="complete-content">
            <div class="success-icon-zone">
                <div class="success-circle">
                    <img src="{% static 'img/CheckCircle.svg' %}" alt="완료" />
                </div>
            </div>

            <h1 class="complete-title">회원가입이<br>완료되었어요!</h1>
            
            <p class="complete-sub-text">
                로그인 후 다양한 후기를<br>확인하고 작성해보세요
            </p>

            <a href="/accounts/login/" class="login-redirect-btn">로그인 하러 가기</a>
        </div>
    </div>
</body>
</html>
