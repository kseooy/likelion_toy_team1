{% load static %}

<!DOCTYPE html>

<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <title>로그인</title>
</head>
<body>
<div class="container">
    <header>
        <div class="headerBox">
            <a href="{% url 'posts:list' %}" class="backIcon">
                <img src="{% static 'img/icon-back.svg' %}" alt="뒤로가기">
            </a>
            <div class="headerTitle">로그인</div>
            <div class="emptyBox"></div>
        </div>
    </header>

<main class="loginContainer">

    <div class="notice">
        <img src="{% static 'img/icon-notice.svg' %}" class="icon-notice" alt="안내">
        <div class="noticeTxt">
            로그인하면 좋아요와 후기 기능을 이용할 수 있어요!
        </div>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="errorMessage">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="loginForm">
        {% csrf_token %}

        <div class="inputBox">
            <label for="username">아이디</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="아이디를 입력하세요"
                required
            >
        </div>

        <div class="inputBox">
            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="비밀번호를 입력하세요"
                required
            >
        </div>

        <button type="submit" class="loginBtn">
            로그인
        </button>
    </form>

</main>


</div>
</body>
</html>
