{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="{% static "css/signup.css" %}" />
</head>
<body>
    <div class="signup-container">
        <div class="signup-content">
            <header class="signup-header">
                <h1 class="main-title">회원가입</h1>
                <p class="sub-title">계정을 만들고 서비스를 이용해보세요</p>
            </header>

            <form class="signup-form" id="signup-form" method="POST" action="">
                {% csrf_token %}
                <div class="input-group">
                    <label class="input-label">아이디</label>
                    <div class="input-container">
                        <input
                            type="text"
                            id="check_username"
                            name="username"
                            placeholder="아이디를 입력해주세요"
                            class="input-field"
                            autocomplete="off"
                        />
                    </div>
                    <div class="status-message-box">
                        <span class="status-item" id="id-len">4~12자 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                        <span class="status-item" id="id-eng">영문 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                        <span class="status-item" id="id-num">숫자 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                        <span class="status-item" id="id-check">중복확인 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">비밀번호</label>
                    <div class="input-container">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="비밀번호를 입력해주세요"
                            class="input-field"
                        />
                        <button type="button" class="password-toggle-btn">
                            <img src="{% static 'img/icon-eye.svg' %}" alt="비밀번호 보기" />
                        </button>
                    </div>
                    <div class="status-message-box">
                        <span class="status-item" id="pw-len">8~20자 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                        <span class="status-item" id="pw-eng">영문 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                        <span class="status-item" id="pw-num">숫자 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                        <span class="status-item" id="pw-special">특수문자 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">비밀번호 확인</label>
                    <div class="input-container">
                        <input
                            type="password"
                            id="check_password"
                            name="password_confirm"
                            placeholder="비밀번호를 입력해주세요"
                            class="input-field"
                        />
                        <button type="button" class="password-toggle-btn">
                            <img src="{% static 'img/icon-eye.svg' %}" alt="비밀번호 숨기기" />
                        </button>
                    </div>
                    <div class="status-message-box">
                        <span class="status-item" id="pw-match">비밀번호 일치 <img src="{% static 'img/Check.svg' %}" alt="체크"/></span>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn" disabled>회원가입 하기</button>
            </form>
            </div>
            <div class="divider-zone">
                <span class="divider-text">또는</span>
            </div>
            <div class="social-login-component">
                <button type="button" class="sns-btn google-btn">
                    <img src="{% static 'img/icon-google.svg' %}" alt="Google" />
                    <span>Google로 가입하기</span>
                </button>
                <button type="button" class="sns-btn apple-btn">
                    <img src="{% static 'img/icon-apple.svg' %}" alt="Apple" />
                    <span>Apple로 가입하기</span>
                </button>
                <div class="footer-link-box">
                    <span class="footer-text">이미 계정이 있으신가요?</span>
                    <a href="/accounts/login/" class="footer-link">로그인</a>
                </div>
            </div>
        </main>
    <script src="{% static 'js/signup.js' %}" defer></script>
    </body>
</html>
