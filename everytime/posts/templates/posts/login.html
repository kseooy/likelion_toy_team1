{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <title>로그인</title>
</head>
<body>
<div class="container">
    <header>
        <div class="headerBox">
            <a href="{% url 'posts:list' %}" class="backIcon">
                <img src="{% static 'img/icon-back.svg' %}">
            </a>
            <div class="headerTitle">로그인</div>
            <div class="emptyBox"></div>
        </div>
    </header>

    <main class="loginContainer">
        <div class="notice">
            <img src="{% static 'img/icon-notice.svg' %}" class="icon-notice">
            <div class="noticeTxt">로그인하면 좋아요와 후기를 더 편하게 이용할 수 있어요!</div>
        </div>

        <form method="POST" class="loginForm">
            {% csrf_token %}

            <div class="inputBox">
                <label for="username">아이디</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="아이디를 입력하세요"
                    required
                >
            </div>

            <div class="inputBox">
                <label for="password">비밀번호</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="비밀번호를 입력하세요"
                    required
                >
            </div>

            <button type="submit" class="loginBtn">로그인</button>
        </form>

        <div class="signupBox">
            <span>아직 계정이 없나요?</span>
            <a href="{% url 'accounts:signup' %}">회원가입</a>
        </div>
    </main>
</div>
</body>
</html>
