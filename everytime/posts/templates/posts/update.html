<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교수 후기 수정</title>
</head>
<body>
    <h2>🛠️ 교수 후기 수정하기</h2>
    <a href="{% url 'posts:detail' post.id %}">취소하고 돌아가기</a>
    <hr>

    <form method="POST" action="{% url 'posts:update' post.id %}" enctype="multipart/form-data">
        {% csrf_token %}

        <p>교수 소속 학과: <input type="text" name="department" value="{{ post.department }}" required></p>
        <p>교수 이름: <input type="text" name="professor_name" value="{{ post.professor_name }}" required></p>
        <p>별점 (1~5): <input type="number" name="rating" min="1" max="5" value="{{ post.rating }}" required></p>
        <p>글 제목: <input type="text" name="title" value="{{ post.title }}" required></p>
        
        <p>후기 내용:<br><textarea name="content" cols="50" rows="10" required>{{ post.content }}</textarea></p>
        
        {% if post.images.all %}
            <p><b>기존 이미지 목록:</b> (새로 첨부 시 이 이미지들은 전부 교체됩니다.)</p>
            <div>
                {% for img_obj in post.images.all %}
                    <img src="{{ img_obj.image.url }}" width="100" style="margin-right: 5px;">
                {% endfor %}
            </div>
            <br>
        {% endif %}
        
        <p>새로운 이미지 첨부 (기존 이미지 대체): <input type="file" name="images" multiple></p>
        
        <p>
            <input type="checkbox" name="is_anonymous" id="anon" {% if post.is_anonymous %}checked{% endif %}> 
            <label for="anon">익명으로 작성하기</label>
        </p>
        
        <input type="submit" value="수정하기">
    </form>
</body>
</html>
