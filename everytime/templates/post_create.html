<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/post_create.css">
    <title>교수 후기 작성</title>
</head>
<body>
<div class="container">
    <header>
        <div class="headerBox">
            <div class="backIcon"><img src="../static/img/icon-back.svg"></div>
            <div class="headerTitle">교수 후기 작성</div>
            <button type="button" class="submitBtn">등록</button>
        </div>
    </header>
<div class="container2">
    <aside>
        <div class="notice">
            <img src="../static/img/icon-notice.svg" class="icon-notice">
            <div class="noticeTxt">솔직하고 구체적인 후기는 다른 학생들에게 큰 도움이 됩니다!</div>
        </div>
    </aside>
    <article class="articleContainer">
    <div class="articleHead">
        <div class="articleTitle">교수 정보</div>
        <div class="articleRequired">필수</div>
    </div>

    <div class="articleContentBox">

        <div class="articleTxtBox">
            <div class="articleTxt">전공</div>

            <select class="articleSelect">
                <option class="optionTxt" value="" selected disabled hidden>
                    전공을 선택하세요
                </option>

                <option class="optionTxt" disabled>전공 검색</option>

                <option>가상현실융합학과</option>
                <option>경영학전공</option>
                <option>국어국문학전공</option>
                <option>데이터사이언스학과</option>
                <option>디지털소프트웨어공학과</option>
                <option>독어독문학전공</option>
                <option>동양화전공</option>
                <option>문헌정보학전공</option>
                <option>문화인류학전공</option>
                <option>미술사학전공</option>
                <option>미래인재대학</option>
                <option>Art&Design대학</option>
                <option>약학대학</option>
                <option>과학기술대학</option>
                <option>글로벌융합대학</option>
                <option>유아교육과</option>
                <option>시각디자인전공</option>
                <option>화학전공</option>
            </select>
        </div>

        <div class="articleTxtBox">
            <div class="articleTxt">교수명</div>

            <select class="articleSelect">
                <option value="" selected disabled hidden>
                    교수명을 선택하세요
                </option>
                <option>김예빈</option>
                <option>김서연</option>
                <option>김민서</option>
                <option>박주현</option>
                <option>정여진</option>
            </select>
        </div>

    </div>
</article>

    <article class="articleContainer">
        <div class="articleHead">
            <div class="articleTitle">별점</div>
            <div class="articleRequired">필수</div>
        </div>
        <div class="article2ContentBox">
            <p class="evaluation">전반적인 만족도를 평가해주세요!</p>
            <div class="starAndScore">
                <div class="starBox">
                    <img src="../static/img/icon-star-gray.svg" class="starImg">
                    <img src="../static/img/icon-star-gray.svg" class="starImg">
                    <img src="../static/img/icon-star-gray.svg" class="starImg">
                    <img src="../static/img/icon-star-gray.svg" class="starImg">
                    <img src="../static/img/icon-star-gray.svg" class="starImg">
                </div>
                <p class="starCnt">0.0</p>
            </div>
        </div>
    </article>
    <article class="articleContainer">

        <div class="articleHeadBox">
            <div class="articleHead">
                <div class="articleTitle">제목</div>
                <div class="articleRequired">필수</div>
            </div>
            <p class="textLimit textLimit1">0/50</p>
        </div>
        <input type="text" class="articleInput" placeholder="제목을 입력해주세요">
    </article>

    
    <article class="articleContainer">
        <div class="articleHeadBox">
        <div class="articleHead">
            <div class="articleTitle">본문</div>
            <div class="articleRequired">필수</div>
        </div>
        <p class="textLimit textLimit2">0/1000</p>
        </div>
        <textarea class="articleTextarea" placeholder="교수님에 대한 후기를 자유롭게 작성해주세요.
        &#10;&#10;수업 내용, 분위기, 평가 방식, 장단점 등 다양한 정보를 공유해주세요!"></textarea>
    </article>


    <article class="articleContainer">
        <div class="articleHeadBox">
            <div class="articleHead">
                <div class="articleTitle">이미지 첨부</div>
                <div class="articleOption">선택</div>
            </div>
            <p class="textLimit">0/5</p>
        </div>

        <div class="uploadBox">
            <input type="file" class="fileInput">

            <div class="uploadInner">
                <img src="../static/img/icon-img.svg">

                <div class="textLimit">
                    이미지를 선택해주세요.</br>
                    (최대5장, 10MB 미만)
                </div>
            </div>
        </div>
    </article>


    <article class="articleContainer">
        <div class="articleHead">
            <div class="articleTitle">익명 설정</div>
            <div class="articleOption">선택</div>
        </div>

        <div class="anonymousBox">

            <img src="../static/img/icon-check-gray.svg" class="checkImg">
            <div class="anonymousContent">
                <div class="anonymousTitle">익명으로 작성하기</div>
                <div class="anonymousDetail">익명으로 작성 시 닉네임이 '익명'으로 표시됩니다.</div>
            </div>
        </div>

    </article>
    </div>
</div>
<script src="../static/js/post_create.js"></script>
</body>
</html>
